<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <!-- Icon: Stylized invoice document with craft spark -->
  <defs>
    <linearGradient id="docGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Document body -->
  <rect x="4" y="8" width="68" height="88" rx="6" ry="6" fill="url(#docGrad)"/>

  <!-- Document fold corner -->
  <polygon points="60,8 72,8 72,20 60,20" fill="#93c5fd"/>

  <!-- Document lines (simulated text) -->
  <rect x="16" y="28" width="40" height="6" rx="3" fill="#bfdbfe" opacity="0.9"/>
  <rect x="16" y="40" width="32" height="4" rx="2" fill="#bfdbfe" opacity="0.6"/>
  <rect x="16" y="50" width="36" height="4" rx="2" fill="#bfdbfe" opacity="0.6"/>
  <rect x="16" y="60" width="28" height="4" rx="2" fill="#bfdbfe" opacity="0.6"/>
  <rect x="16" y="70" width="34" height="4" rx="2" fill="#bfdbfe" opacity="0.6"/>

  <!-- Checkmark on document -->
  <polyline points="30,52 36,58 46,48" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle craft sparkle -->
  <polygon points="78,12 80,18 86,20 80,22 78,28 76,22 70,20 76,18" fill="#f59e0b"/>

  <!-- Wordmark: InvoiceCraft -->
  <text x="106" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="700" fill="#0f0f23" letter-spacing="-0.5">
    Invoice<tspan fill="#2563eb">Craft</tspan>
  </text>

  <!-- Tagline -->
  <text x="108" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" fill="#6b7280" letter-spacing="0.02em">
    Free Online Invoice Generator
  </text>
</svg>
